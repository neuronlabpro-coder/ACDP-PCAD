version: "3.9"

services:
  acdp:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3100:3100"
    environment:
      ACDP_PORT: ${ACDP_PORT:-3100}
      ACDP_TOKEN: ${ACDP_TOKEN}
      ACDP_OWNER: ${ACDP_OWNER:-neuronguard-engine}
      ACDP_SUB_OWNER: ${ACDP_SUB_OWNER:-}
      ACDP_TTL_MINUTES: ${ACDP_TTL_MINUTES:-15}
      ACDP_COMMIT_TIMEOUT_MINUTES: ${ACDP_COMMIT_TIMEOUT_MINUTES:-10}
      ACDP_ALLOW_REMOTE: "1"
      ACDP_FORCE_CONFIG: "1"
      NODE_ENV: production
    volumes:
      - acdp_data:/app/acdp-socket-server
      - acdp_governance:/app/acdp
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3100/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  acdp_data:
  acdp_governance:

